<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1N80W1B7XZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());

      gtag('config', 'G-1N80W1B7XZ');
    </script>
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <title>AI World Cup</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="https://cdn.staticfile.net/translate.js/3.18.66/translate.js"></script>
    <script>
      translate.selectLanguageTag.show = false;
      translate.service.use('client.edge');
      translate.listener.start();
      // 延迟翻译，让页面先渲染，避免大表格卡顿
      var tid = requestIdleCallback ? requestIdleCallback(function() { translate.execute(); }) : setTimeout(function() { translate.execute(); }, 100);
    </script>
    <style>
      /* 大表格逐行渲染，避免 translate.js 一次处理全部行卡死 */
      article .table-scroll tr {
        content-visibility: auto;
        contain-intrinsic-size: auto 48px;
      }
    </style>
  </body>
</html>
