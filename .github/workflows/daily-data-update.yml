name: Daily Data Update

on:
  schedule:
    # Runs daily at 08:15 UTC.
    - cron: "15 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python package
        run: python -m pip install -e .

      - name: Sync football data
        run: aiwc data sync --sources openfootball,worldcup26

      - name: Rebuild website data
        run: python scripts/rebuild_site_data.py

      - name: Show data status
        run: aiwc data status

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/*.json data/prompts/tournament/*.md data/prompts/tournament/*.json website/public/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update daily World Cup data"
            git push
          fi
